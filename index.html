<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prueba 25-06</title>
    <link href="styles.css" rel="stylesheet" type="text/css">
</head>
<body>
    <div class="form-container">
        <h1>Prueba evaluación web | 25-06</h1>
        <h2>Formulario datitos tatatitos</h2>

        <form id="miFormulario">
            <div class="campo" id="grupo-usuario">
                <label for="nombre">Nombre:</label>
                <input type="text" id="nombre" name="nombre" required>
                <span id="info-user" class="msg"></span>
            </div>

            <div class="campo" id="grupo-email">
                <label for="email">Correo:</label>
                <input type="email" id="email" name="email" required>
                <span id="info-email" class="msg"></span>
            </div>

            <div class="campo" id="grupo-pass">
                <label for="password">Contraseña:</label>
                <input type="password" id="password" name="password" required>
                <span id="info-pass" class="msg"></span>
            </div>

            <div class="campo" id="grupo-confPass">
                <label for="confirm_password">Confirmar contraseña:</label>
                <input type="password" id="confirm_password" name="confirm_password" required>
                <span id="info-confPass" class="msg"></span>
            </div>

            <button id="boton" type="submit" disabled>Enviar datitos tatatitos</button>
        </form>
        <p id="confirmationMessage" class="success" style="display:none;"></p>
    </div>
    <script src="script.js"></script>
</body>
</html>
